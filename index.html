<html>
  <head>
    <title>Primeira experiência de RA usando o AR.js e o A-frame. Marcador Hiro e modelos 3D do A-frame.</title>
     <script src="https://aframe.io/releases/1.3.0/aframe.min.js"></script>
     <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
  </head>
  <body style="margin: 0px; overflow: hidden">
    <a-scene 
      vr-mode-ui="enabled: false" 
      embedded 
      arjs="debugUIEnabled: false"
      renderer="logarithmicDepthBuffer: true; antialias: true;">
        
        <a-marker preset="hiro">
        <a-entity gltf-model="kasane_teto.glb" position="0 0 0" scale="0.05 0.05 0.05" rotation="-90 0 0"></a-entity>
      </a-marker>
        <a-entity camera="near: 0.1; far: 1000"></a-entity>
    </a-scene>
  </body>
</html>
